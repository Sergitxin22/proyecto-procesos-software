name: CI

on:
  push:
    branches: [ main, workflow ]
  pull_request:
    branches: [ main, workflow ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: gradle
    - name: Build with Gradle
      run: ./gradlew build
    - name: Run tests
      run: ./gradlew test
